<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 음성 안내</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --bg: #0a0e17; --surface: #111827; --surface2: #1a2235; --border: #1e2d45;
    --accent: #00e5ff; --green: #00e676; --red: #ff4d6d; --text: #e2e8f0; --muted: #64748b;
    --mono: 'IBM Plex Mono', monospace; --sans: 'Noto Sans KR', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; }
  .header { text-align: center; padding: 28px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .header-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 700; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .card-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

  .market-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .market-tab { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
  .market-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }

  .search-wrap { position: relative; }
  .search-row { display: flex; gap: 8px; }
  .search-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 14px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); font-size: 13px; }
  .btn-search { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; min-height: 44px; }

  .autocomplete { position: absolute; top: calc(100% + 4px); left: 0; right: 52px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; z-index: 100; max-height: 260px; overflow-y: auto; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .autocomplete.show { display: block; }
  .ac-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; border-bottom: 1px solid var(--border); }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.focused { background: var(--surface2); }
  .ac-left { flex: 1; min-width: 0; }
  .ac-ticker { font-family: var(--mono); font-size: 13px; font-weight: 600; color: var(--accent); }
  .ac-name { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .ac-star { font-size: 18px; padding: 2px 4px; cursor: pointer; flex-shrink: 0; }
  .ac-empty { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }
  .ac-loading { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }

  .stock-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; min-height: 32px; }
  .stock-tag { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-family: var(--mono); }
  .stock-tag.kr { border-color: #3b82f6; }
  .stock-tag.us { border-color: #f59e0b; }
  .stock-tag .remove { color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; }

  .watchlist { display: flex; flex-direction: column; gap: 8px; }
  .watchlist-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .watchlist-item.kr { border-left: 3px solid #3b82f6; }
  .watchlist-item.us { border-left: 3px solid #f59e0b; }
  .wl-info { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .wl-text { min-width: 0; }
  .wl-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wl-code { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .wl-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .wl-btn { border: none; border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; font-weight: 600; }
  .wl-btn-add { background: rgba(0,230,118,0.15); color: var(--green); }
  .wl-btn-del { background: rgba(255,77,109,0.15); color: var(--red); }
  .wl-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 14px 0; line-height: 1.8; }

  .price-board { display: none; flex-direction: column; gap: 10px; margin-top: 4px; }
  .price-board.visible { display: flex; }
  .price-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .price-row.kr { border-left: 3px solid #3b82f6; }
  .price-row.us { border-left: 3px solid #f59e0b; }
  .price-name { font-size: 13px; font-weight: 500; color: var(--muted); }
  .price-session { font-size: 10px; margin-top: 2px; }
  .session-pre { color: #f59e0b; } .session-regular { color: var(--green); }
  .session-post { color: #a78bfa; } .session-closed { color: var(--muted); }
  .price-values { text-align: right; }
  .price-current { font-family: var(--mono); font-size: 20px; font-weight: 600; line-height: 1; }
  .price-change { font-family: var(--mono); font-size: 11px; margin-top: 3px; }
  .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--muted); }

  .interval-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
  .interval-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 12px 4px; cursor: pointer; text-align: center; min-height: 44px; }
  .interval-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .item-check { display: flex; align-items: center; gap: 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px; cursor: pointer; user-select: none; min-height: 50px; touch-action: manipulation; }
  .item-check.active { border-color: var(--accent); background: rgba(0,229,255,0.07); }
  .check-box { width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .item-check.active .check-box { background: var(--accent); border-color: var(--accent); }
  .check-icon { display: none; color: #000; font-size: 14px; font-weight: 900; }
  .item-check.active .check-icon { display: block; }
  .item-label { font-size: 13px; color: var(--text); }

  /* 음성 설정 */
  .voice-settings { display: flex; flex-direction: column; gap: 14px; }
  .voice-row { display: flex; align-items: center; justify-content: space-between; }
  .voice-label { font-size: 14px; font-weight: 500; }
  .toggle { position: relative; width: 52px; height: 30px; cursor: pointer; }
  .toggle input { display: none; }
  .toggle-track { width: 100%; height: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 15px; transition: all 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle-thumb { position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; background: var(--muted); border-radius: 50%; transition: all 0.2s; }
  .toggle input:checked ~ .toggle-thumb { left: 26px; background: #000; }

  /* 목소리 선택 */
  .voice-select-wrap { display: flex; flex-direction: column; gap: 8px; }
  .voice-select-label { font-size: 12px; color: var(--muted); }
  .voice-gender-tabs { display: flex; gap: 6px; }
  .gender-tab { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.15s; }
  .gender-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.07); }
  .voice-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .voice-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .voice-item:hover { border-color: var(--accent); }
  .voice-item.selected { border-color: var(--accent); background: rgba(0,229,255,0.07); }
  .voice-item-info { display: flex; flex-direction: column; gap: 2px; }
  .voice-item-name { font-size: 13px; font-weight: 500; }
  .voice-item-desc { font-size: 11px; color: var(--muted); }
  .btn-test { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 11px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  .btn-test:hover { border-color: var(--accent); color: var(--accent); }

  /* 속도 슬라이더 */
  .speed-wrap { display: flex; align-items: center; gap: 10px; }
  .speed-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .speed-slider { flex: 1; accent-color: var(--accent); }
  .speed-val { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 30px; text-align: right; }

  .btn-main { width: 100%; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: var(--sans); padding: 18px; cursor: pointer; min-height: 56px; margin-bottom: 20px; }
  .btn-start { background: var(--green); color: #000; }
  .btn-stop { background: var(--red); color: #fff; }

  .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 14px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-text { font-size: 12px; font-family: var(--mono); color: var(--muted); }
  .next-time { margin-left: auto; font-size: 11px; font-family: var(--mono); color: var(--muted); }
  .error-msg { color: var(--red); font-size: 12px; font-family: var(--mono); margin-top: 8px; text-align: center; }
  .delay-notice { color: var(--muted); font-size: 11px; font-family: var(--mono); margin-top: 6px; text-align: center; }

  .voice-init { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
  .voice-init.show { display: flex; }
  .voice-init-box { background: var(--surface); border: 1px solid var(--accent); border-radius: 16px; padding: 30px 24px; text-align: center; max-width: 300px; }
  .voice-init-box h3 { font-size: 18px; margin-bottom: 10px; }
  .voice-init-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .btn-voice-ok { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 14px 32px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
</style>
</head>
<body>

<div class="voice-init" id="voiceInit">
  <div class="voice-init-box">
    <h3>🔊 음성 안내 활성화</h3>
    <p>폰에서 음성을 재생하려면<br>아래 버튼을 한 번 눌러주세요</p>
    <button class="btn-voice-ok" onclick="initVoice()">음성 켜기</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="header-label">Real-time Voice Alert</div>
    <h1>📈 주식 음성 안내</h1>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">대기 중</span>
    <span class="next-time" id="nextTime"></span>
  </div>

  <div class="card">
    <div class="card-title">종목 검색</div>
    <div class="market-tabs">
      <div class="market-tab active" id="tab-kr" onclick="switchTab('kr')">🇰🇷 한국 주식</div>
      <div class="market-tab" id="tab-us" onclick="switchTab('us')">🇺🇸 미국 주식</div>
    </div>
    <div class="search-wrap">
      <div class="search-row">
        <input class="search-input" id="stockInput" type="text" placeholder="종목명 입력 (예: 삼성전자)" autocomplete="off" />
        <button class="btn-search" onclick="addFromInput()">추가</button>
      </div>
      <div class="autocomplete" id="autocomplete"></div>
    </div>
    <div class="stock-tags" id="stockTags"></div>
  </div>

  <div class="card">
    <div class="card-title">⭐ 관심목록</div>
    <div class="watchlist" id="watchlist"></div>
  </div>

  <div class="card">
    <div class="card-title">실시간 현재가</div>
    <div class="price-board" id="priceBoard"></div>
    <div id="pricePlaceholder" style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0;">종목을 추가하고 시작하면 표시됩니다</div>
    <div id="errorMsg" class="error-msg"></div>
    <div class="delay-notice">※ Yahoo Finance 기준 (15~20분 지연)</div>
  </div>

  <div class="card">
    <div class="card-title">안내 간격</div>
    <div class="interval-grid">
      <button class="interval-btn" onclick="setInterval_(5, this)">5초</button>
      <button class="interval-btn active" onclick="setInterval_(10, this)">10초</button>
      <button class="interval-btn" onclick="setInterval_(20, this)">20초</button>
      <button class="interval-btn" onclick="setInterval_(30, this)">30초</button>
      <button class="interval-btn" onclick="setInterval_(60, this)">1분</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">음성 안내 항목 (중복선택 가능)</div>
    <div class="items-grid">
      <div class="item-check active" id="chk-name" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">종목명</span>
      </div>
      <div class="item-check active" id="chk-price" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">현재가</span>
      </div>
      <div class="item-check active" id="chk-rate" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">등락률</span>
      </div>
      <div class="item-check" id="chk-change" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">전일대비 등락가</span>
      </div>
    </div>
  </div>

  <!-- 음성 설정 -->
  <div class="card">
    <div class="card-title">🔊 음성 설정</div>
    <div class="voice-settings">

      <!-- ON/OFF -->
      <div class="voice-row">
        <span class="voice-label">음성 안내</span>
        <label class="toggle">
          <input type="checkbox" id="voiceToggle" checked>
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>

      <hr class="divider">

      <!-- 성별 탭 -->
      <div class="voice-select-wrap">
        <div class="voice-select-label">목소리 선택</div>
        <div class="voice-gender-tabs">
          <div class="gender-tab active" id="gender-female" onclick="filterVoices('female')">👩 여성</div>
          <div class="gender-tab" id="gender-male" onclick="filterVoices('male')">👨 남성</div>
          <div class="gender-tab" id="gender-all" onclick="filterVoices('all')">전체</div>
        </div>
        <div class="voice-list" id="voiceList">
          <div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">목소리 불러오는 중...</div>
        </div>
      </div>

      <hr class="divider">

      <!-- 속도 슬라이더 -->
      <div class="voice-select-wrap">
        <div class="voice-select-label">말하기 속도</div>
        <div class="speed-wrap">
          <span class="speed-label">느림</span>
          <input type="range" class="speed-slider" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateSpeed(this.value)">
          <span class="speed-label">빠름</span>
          <span class="speed-val" id="speedVal">1.0x</span>
        </div>
      </div>

    </div>
  </div>

  <button class="btn-main btn-start" id="mainBtn" onclick="toggleService()">▶ 시작</button>
</div>

<script>
  const WORKER = 'https://proud-disk-6fe5.hg4290990.workers.dev';

  let stocks = [];
  let watchlist = JSON.parse(localStorage.getItem('wl_v2') || '[]');
  let intervalSec = 10;
  let running = false;
  let timer = null;
  let countdown = null;
  let nextSec = 0;
  let speechQueue = [];
  let isSpeaking = false;
  let voiceReady = false;
  let currentTab = 'kr';
  let acFocusIdx = -1;
  let acResults = [];
  let searchTimer = null;
  let selectedVoice = null;
  let speechRate = 1.0;
  let genderFilter = 'female';
  let allVoices = [];

  window.addEventListener('load', () => {
    document.getElementById('voiceInit').classList.add('show');
    renderWatchlist();
  });

  // 음성 목록 로드
  function loadVoices() {
    allVoices = speechSynthesis.getVoices();
    renderVoiceList();
  }

  speechSynthesis.onvoiceschanged = loadVoices;

  function getKoreanVoices() {
    return allVoices.filter(v => v.lang.startsWith('ko'));
  }

  function filterVoices(gender) {
    genderFilter = gender;
    document.querySelectorAll('.gender-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`gender-${gender}`).classList.add('active');
    renderVoiceList();
  }

  function renderVoiceList() {
    const list = document.getElementById('voiceList');
    let voices = getKoreanVoices();

    if (!voices.length) {
      // 한국어 없으면 전체에서 검색
      voices = allVoices;
    }

    // 성별 필터 (이름 기반 추측)
    if (genderFilter !== 'all') {
      const femaleKeywords = ['female', 'woman', 'girl', 'yuna', 'sora', 'heami', 'jisoo', 'seoyeon', 'kyuri', 'hyoyeon'];
      const maleKeywords = ['male', 'man', 'guy', 'minjun', 'junho', 'daniel', 'tom', 'james'];
      voices = voices.filter(v => {
        const nameLower = v.name.toLowerCase();
        if (genderFilter === 'female') return femaleKeywords.some(k => nameLower.includes(k)) || !maleKeywords.some(k => nameLower.includes(k));
        if (genderFilter === 'male') return maleKeywords.some(k => nameLower.includes(k));
        return true;
      });
    }

    if (!voices.length) {
      list.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px">사용 가능한 목소리가 없습니다</div>';
      return;
    }

    list.innerHTML = voices.slice(0, 8).map((v, i) => `
      <div class="voice-item ${selectedVoice?.name === v.name ? 'selected' : ''}" onclick="selectVoice('${v.name.replace(/'/g,"\\'")}')">
        <div class="voice-item-info">
          <div class="voice-item-name">${v.name}</div>
          <div class="voice-item-desc">${v.lang} ${v.localService ? '· 로컬' : '· 온라인'}</div>
        </div>
        <button class="btn-test" onclick="testVoice('${v.name.replace(/'/g,"\\'")}');event.stopPropagation()">테스트</button>
      </div>
    `).join('');
  }

  function selectVoice(name) {
    selectedVoice = allVoices.find(v => v.name === name) || null;
    renderVoiceList();
  }

  function testVoice(name) {
    const voice = allVoices.find(v => v.name === name);
    if (!voice) return;
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance('삼성전자 현재가 7만 8천원, 플러스 1.2퍼센트');
    utter.voice = voice;
    utter.lang = voice.lang;
    utter.rate = speechRate;
    speechSynthesis.speak(utter);
  }

  function updateSpeed(val) {
    speechRate = parseFloat(val);
    document.getElementById('speedVal').textContent = val + 'x';
  }

  function initVoice() {
    const utter = new SpeechSynthesisUtterance('');
    utter.volume = 0;
    speechSynthesis.speak(utter);
    voiceReady = true;
    document.getElementById('voiceInit').classList.remove('show');
    setTimeout(() => { loadVoices(); }, 500);
  }

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('tab-kr').classList.toggle('active', tab === 'kr');
    document.getElementById('tab-us').classList.toggle('active', tab === 'us');
    document.getElementById('stockInput').placeholder = tab === 'kr'
      ? '종목명 입력 (예: 삼성전자, SK하이닉스)'
      : '티커 또는 종목명 (예: AAPL, Apple)';
    document.getElementById('stockInput').value = '';
    hideAC();
  }

  async function fetchAutoComplete(query) {
    try {
      const url = `${WORKER}/?autocomplete=${encodeURIComponent(query)}`;
      const res = await fetch(url, { signal: AbortSignal.timeout(4000) });
      if (!res.ok) return [];
      const data = await res.json();
      const quotes = data?.quotes || [];
      return quotes
        .filter(q => {
          if (currentTab === 'kr') return q.exchange === 'KSC' || q.exchange === 'KOE';
          return q.quoteType === 'EQUITY' && !q.symbol.includes('.');
        })
        .slice(0, 8)
        .map(q => ({ code: q.symbol, name: q.longname || q.shortname || q.symbol, market: currentTab }));
    } catch(e) { return []; }
  }

  function showAC(results, loading = false) {
    const ac = document.getElementById('autocomplete');
    acResults = results;
    acFocusIdx = -1;
    if (loading) { ac.innerHTML = '<div class="ac-loading">🔍 검색 중...</div>'; ac.classList.add('show'); return; }
    if (!results.length) { ac.innerHTML = '<div class="ac-empty">검색 결과가 없습니다</div>'; ac.classList.add('show'); return; }
    ac.innerHTML = results.map((r, i) => `
      <div class="ac-item" id="ac-${i}">
        <div class="ac-left" onclick="selectAC(${i})">
          <div class="ac-ticker">${r.code}</div>
          <div class="ac-name">${r.name}</div>
        </div>
        <span class="ac-star" onclick="addToWatchlist('${r.code}','${r.name.replace(/'/g,"\\'")}','${r.market}');event.stopPropagation()" title="관심목록 추가">⭐</span>
      </div>
    `).join('');
    ac.classList.add('show');
  }

  function hideAC() {
    document.getElementById('autocomplete').classList.remove('show');
    acResults = []; acFocusIdx = -1;
  }

  function selectAC(idx) {
    const r = acResults[idx];
    if (!r) return;
    addStock(r.code, r.name, r.market);
    document.getElementById('stockInput').value = '';
    hideAC();
  }

  document.getElementById('stockInput').addEventListener('input', function() {
    const val = this.value.trim();
    if (!val) { hideAC(); return; }
    clearTimeout(searchTimer);
    showAC([], true);
    searchTimer = setTimeout(async () => {
      const results = await fetchAutoComplete(val);
      showAC(results);
    }, 300);
  });

  document.getElementById('stockInput').addEventListener('keydown', function(e) {
    const items = document.querySelectorAll('.ac-item');
    if (e.key === 'ArrowDown') { e.preventDefault(); acFocusIdx = Math.min(acFocusIdx + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); acFocusIdx = Math.max(acFocusIdx - 1, -1); items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx)); }
    else if (e.key === 'Enter') { if (acFocusIdx >= 0) selectAC(acFocusIdx); else if (acResults.length > 0) selectAC(0); else addFromInput(); }
    else if (e.key === 'Escape') hideAC();
  });

  document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) hideAC(); });

  function addFromInput() {
    const val = document.getElementById('stockInput').value.trim();
    if (!val) return;
    if (acResults.length > 0) { selectAC(0); return; }
    if (currentTab === 'us') addStock(val.toUpperCase(), val.toUpperCase(), 'us');
    else if (/^\d{6}$/.test(val)) addStock(val, val, 'kr');
    else { alert('검색 결과에서 종목을 선택해 주세요!'); return; }
    document.getElementById('stockInput').value = '';
    hideAC();
  }

  function addStock(code, name, market) {
    const id = market + ':' + code;
    if (stocks.find(s => s.id === id)) return;
    stocks.push({ id, code, name, market });
    renderTags();
  }

  function removeStock(id) {
    stocks = stocks.filter(s => s.id !== id);
    renderTags(); renderPriceBoard();
  }

  function renderTags() {
    document.getElementById('stockTags').innerHTML = stocks.map(s => `
      <div class="stock-tag ${s.market}">
        <span>${s.market === 'kr' ? '🇰🇷' : '🇺🇸'}</span>
        <span>${s.name}</span>
        <span class="remove" onclick="removeStock('${s.id}')">×</span>
      </div>
    `).join('');
  }

  function addToWatchlist(code, name, market) {
    const id = market + ':' + code;
    if (watchlist.find(w => w.id === id)) { alert('이미 관심목록에 있어요!'); return; }
    watchlist.push({ id, code, name, market });
    localStorage.setItem('wl_v2', JSON.stringify(watchlist));
    renderWatchlist();
  }

  function removeFromWatchlist(id) {
    watchlist = watchlist.filter(w => w.id !== id);
    localStorage.setItem('wl_v2', JSON.stringify(watchlist));
    renderWatchlist();
  }

  function addWatchlistToMonitor(id) {
    const item = watchlist.find(w => w.id === id);
    if (!item) return;
    addStock(item.code, item.name, item.market);
  }

  function renderWatchlist() {
    const el = document.getElementById('watchlist');
    if (!watchlist.length) { el.innerHTML = '<div class="wl-empty">관심종목이 없습니다<br><small>검색 후 ⭐ 버튼으로 추가하세요</small></div>'; return; }
    el.innerHTML = watchlist.map(w => `
      <div class="watchlist-item ${w.market}">
        <div class="wl-info">
          <span>${w.market === 'kr' ? '🇰🇷' : '🇺🇸'}</span>
          <div class="wl-text">
            <div class="wl-name">${w.name}</div>
            <div class="wl-code">${w.code}</div>
          </div>
        </div>
        <div class="wl-actions">
          <button class="wl-btn wl-btn-add" onclick="addWatchlistToMonitor('${w.id}')">+ 모니터</button>
          <button class="wl-btn wl-btn-del" onclick="removeFromWatchlist('${w.id}')">삭제</button>
        </div>
      </div>
    `).join('');
  }

  function toggleCheck(el) { el.classList.toggle('active'); }

  function getChecked() {
    return {
      name: document.getElementById('chk-name').classList.contains('active'),
      price: document.getElementById('chk-price').classList.contains('active'),
      rate: document.getElementById('chk-rate').classList.contains('active'),
      change: document.getElementById('chk-change').classList.contains('active'),
    };
  }

  function setInterval_(sec, btn) {
    intervalSec = sec;
    document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function getSession(meta) {
    const now = Date.now() / 1000;
    const tp = meta.currentTradingPeriod;
    if (!tp) return 'regular';
    if (tp.pre && now >= tp.pre.start && now < tp.pre.end) return 'pre';
    if (tp.regular && now >= tp.regular.start && now < tp.regular.end) return 'regular';
    if (tp.post && now >= tp.post.start && now < tp.post.end) return 'post';
    return 'closed';
  }

  async function fetchPrice(stock) {
    try {
      const symbol = stock.market === 'kr' ? stock.code + '.KS' : stock.code;
      const url = `${WORKER}/?symbol=${symbol}`;
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) throw new Error('fail');
      const data = await res.json();
      const meta = data?.chart?.result?.[0]?.meta;
      if (!meta) return null;
      const session = stock.market === 'us' ? getSession(meta) : 'regular';
      let price = meta.regularMarketPrice;
      if (stock.market === 'us') {
        if (session === 'pre' && meta.preMarketPrice) price = meta.preMarketPrice;
        if (session === 'post' && meta.postMarketPrice) price = meta.postMarketPrice;
      }
      const prevClose = meta.chartPreviousClose || meta.previousClose;
      const change = price - prevClose;
      const rate = (change / prevClose) * 100;
      const sign = change > 0 ? 'up' : change < 0 ? 'down' : 'flat';
      const isKr = stock.market === 'kr';
      const sessionLabel = { pre: '🟡 프리마켓', regular: '🟢 정규장', post: '🟣 애프터마켓', closed: '⚫ 장마감' }[session];
      return {
        price: isKr ? Math.round(price).toLocaleString() + '원' : '$' + price.toFixed(2),
        priceRaw: isKr ? Math.round(price).toLocaleString() : price.toFixed(2),
        changeVal: isKr ? Math.abs(Math.round(change)).toLocaleString() + '원' : '$' + Math.abs(change).toFixed(2),
        changeRaw: isKr ? Math.abs(Math.round(change)).toLocaleString() : Math.abs(change).toFixed(2),
        rateVal: Math.abs(rate).toFixed(2),
        sign, session, sessionLabel,
        currency: isKr ? '원' : '달러'
      };
    } catch(e) { return null; }
  }

  function renderPriceBoard() {
    const board = document.getElementById('priceBoard');
    const placeholder = document.getElementById('pricePlaceholder');
    if (!stocks.length) { board.classList.remove('visible'); placeholder.style.display = 'block'; return; }
    placeholder.style.display = 'none';
    board.classList.add('visible');
    board.innerHTML = stocks.map(s => `
      <div class="price-row ${s.market}" id="pr-${s.id.replace(':','-')}">
        <div>
          <div class="price-name">${s.market === 'kr' ? '🇰🇷' : '🇺🇸'} ${s.name}</div>
          <div class="price-session" id="ps-${s.id.replace(':','-')}"></div>
        </div>
        <div class="price-values">
          <div class="price-current" id="pc-${s.id.replace(':','-')}">불러오는 중...</div>
          <div class="price-change flat" id="pch-${s.id.replace(':','-')}">--</div>
        </div>
      </div>
    `).join('');
  }

  async function updatePrices() {
    const errEl = document.getElementById('errorMsg');
    let anyError = false;
    for (const stock of stocks) {
      const data = await fetchPrice(stock);
      const safeId = stock.id.replace(':', '-');
      if (!data) { anyError = true; continue; }
      const priceEl = document.getElementById(`pc-${safeId}`);
      const changeEl = document.getElementById(`pch-${safeId}`);
      const sessionEl = document.getElementById(`ps-${safeId}`);
      if (!priceEl) continue;
      errEl.textContent = '';
      const arrow = data.sign === 'up' ? '▲' : data.sign === 'down' ? '▼' : '─';
      const signTxt = data.sign === 'up' ? '+' : data.sign === 'down' ? '-' : '';
      priceEl.textContent = data.price;
      changeEl.textContent = `${arrow} ${signTxt}${data.changeVal} (${signTxt}${data.rateVal}%)`;
      changeEl.className = `price-change ${data.sign}`;
      if (sessionEl) { sessionEl.textContent = data.sessionLabel || ''; sessionEl.className = `price-session session-${data.session}`; }

      if (document.getElementById('voiceToggle').checked && voiceReady) {
        const checked = getChecked();
        let parts = [];
        if (checked.name) parts.push(stock.name);
        if (stock.market === 'us' && data.session !== 'regular') parts.push(data.sessionLabel?.replace(/[🟡🟢🟣⚫]/g, '').trim() || '');
        if (checked.price) parts.push(`현재가 ${data.priceRaw}${data.currency}`);
        if (checked.rate) { const sw = data.sign === 'up' ? '플러스' : data.sign === 'down' ? '마이너스' : ''; parts.push(`${sw} ${data.rateVal}퍼센트`); }
        if (checked.change) { const sw = data.sign === 'up' ? '플러스' : data.sign === 'down' ? '마이너스' : ''; parts.push(`전일대비 ${sw} ${data.changeRaw}${data.currency}`); }
        if (parts.length > 0) queueSpeak(parts.join(', '));
      }
    }
    if (anyError) errEl.textContent = '⚠ 일부 종목을 불러오지 못했습니다.';
  }

  function queueSpeak(text) {
    speechQueue.push(text);
    if (!isSpeaking) processQueue();
  }

  function processQueue() {
    if (!speechQueue.length) { isSpeaking = false; return; }
    isSpeaking = true;
    const text = speechQueue.shift();
    const utter = new SpeechSynthesisUtterance(text);
    if (selectedVoice) { utter.voice = selectedVoice; utter.lang = selectedVoice.lang; }
    else utter.lang = 'ko-KR';
    utter.rate = speechRate;
    utter.onend = () => processQueue();
    speechSynthesis.speak(utter);
  }

  function startCountdown() {
    nextSec = intervalSec;
    if (countdown) clearInterval(countdown);
    countdown = setInterval(() => {
      nextSec--;
      document.getElementById('nextTime').textContent = `다음 안내 ${nextSec}초 후`;
      if (nextSec <= 0) nextSec = intervalSec;
    }, 1000);
  }

  async function toggleService() {
    if (!running) {
      if (!stocks.length) { alert('종목을 먼저 추가해 주세요!'); return; }
      running = true;
      document.getElementById('mainBtn').textContent = '■ 정지';
      document.getElementById('mainBtn').className = 'btn-main btn-stop';
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusText').textContent = '안내 중';
      renderPriceBoard();
      await updatePrices();
      startCountdown();
      timer = setInterval(async () => { await updatePrices(); startCountdown(); }, intervalSec * 1000);
    } else {
      running = false;
      clearInterval(timer); clearInterval(countdown);
      speechSynthesis.cancel();
      speechQueue = []; isSpeaking = false;
      document.getElementById('mainBtn').textContent = '▶ 시작';
      document.getElementById('mainBtn').className = 'btn-main btn-start';
      document.getElementById('statusDot').classList.remove('active');
      document.getElementById('statusText').textContent = '대기 중';
      document.getElementById('nextTime').textContent = '';
    }
  }
</script>
</body>
</html>
