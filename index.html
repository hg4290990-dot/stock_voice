<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주식 음성 안내</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #00e5ff;
    --green: #00e676;
    --red: #ff4d6d;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 20px; }
  .container { max-width: 480px; margin: 0 auto; }

  .header { text-align: center; padding: 28px 0 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .header-label { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-size: 22px; font-weight: 700; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
  .card-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

  .search-row { display: flex; gap: 8px; }
  .search-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 10px 14px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); font-size: 13px; }
  .btn-search { background: var(--accent); color: #000; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; min-height: 44px; }

  .stock-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 12px; min-height: 32px; }
  .stock-tag { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-family: var(--mono); }
  .stock-tag .remove { color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; }

  .price-board { display: none; flex-direction: column; gap: 10px; margin-top: 4px; }
  .price-board.visible { display: flex; }
  .price-row { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  .price-name { font-size: 13px; font-weight: 500; color: var(--muted); }
  .price-values { text-align: right; }
  .price-current { font-family: var(--mono); font-size: 20px; font-weight: 600; line-height: 1; }
  .price-change { font-family: var(--mono); font-size: 11px; margin-top: 3px; }
  .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--muted); }

  .interval-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; }
  .interval-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 12px 4px; cursor: pointer; text-align: center; min-height: 44px; }
  .interval-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .item-check { display: flex; align-items: center; gap: 9px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 12px; cursor: pointer; user-select: none; min-height: 50px; touch-action: manipulation; }
  .item-check.active { border-color: var(--accent); background: rgba(0, 229, 255, 0.07); }
  .check-box { width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .item-check.active .check-box { background: var(--accent); border-color: var(--accent); }
  .check-icon { display: none; color: #000; font-size: 14px; font-weight: 900; }
  .item-check.active .check-icon { display: block; }
  .item-label { font-size: 13px; color: var(--text); }

  .voice-row { display: flex; align-items: center; justify-content: space-between; }
  .voice-label { font-size: 14px; font-weight: 500; }
  .toggle { position: relative; width: 52px; height: 30px; cursor: pointer; }
  .toggle input { display: none; }
  .toggle-track { width: 100%; height: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 15px; transition: all 0.2s; }
  .toggle input:checked + .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle-thumb { position: absolute; top: 4px; left: 4px; width: 20px; height: 20px; background: var(--muted); border-radius: 50%; transition: all 0.2s; }
  .toggle input:checked ~ .toggle-thumb { left: 26px; background: #000; }

  .btn-main { width: 100%; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: var(--sans); padding: 18px; cursor: pointer; min-height: 56px; margin-bottom: 20px; }
  .btn-start { background: var(--green); color: #000; }
  .btn-stop { background: var(--red); color: #fff; }

  .status-bar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 14px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-text { font-size: 12px; font-family: var(--mono); color: var(--muted); }
  .next-time { margin-left: auto; font-size: 11px; font-family: var(--mono); color: var(--muted); }

  .quick-stocks { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .quick-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; padding: 8px 12px; cursor: pointer; font-family: var(--mono); min-height: 36px; }

  .voice-init { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
  .voice-init.show { display: flex; }
  .voice-init-box { background: var(--surface); border: 1px solid var(--accent); border-radius: 16px; padding: 30px 24px; text-align: center; max-width: 300px; }
  .voice-init-box h3 { font-size: 18px; margin-bottom: 10px; }
  .voice-init-box p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .btn-voice-ok { background: var(--accent); color: #000; border: none; border-radius: 10px; padding: 14px 32px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }

  .error-msg { color: var(--red); font-size: 12px; font-family: var(--mono); margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<div class="voice-init" id="voiceInit">
  <div class="voice-init-box">
    <h3>🔊 음성 안내 활성화</h3>
    <p>폰에서 음성을 재생하려면<br>아래 버튼을 한 번 눌러주세요</p>
    <button class="btn-voice-ok" onclick="initVoice()">음성 켜기</button>
  </div>
</div>

<div class="container">
  <div class="header">
    <div class="header-label">Real-time Voice Alert</div>
    <h1>📈 주식 음성 안내</h1>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">대기 중</span>
    <span class="next-time" id="nextTime"></span>
  </div>

  <div class="card">
    <div class="card-title">종목 설정</div>
    <div class="search-row">
      <input class="search-input" id="stockInput" type="text" placeholder="종목명 또는 코드 (예: 005930)" />
      <button class="btn-search" onclick="addStock()">추가</button>
    </div>
    <div class="quick-stocks">
      <button class="quick-btn" onclick="addQuick('005930','삼성전자')">삼성전자</button>
      <button class="quick-btn" onclick="addQuick('000660','SK하이닉스')">SK하이닉스</button>
      <button class="quick-btn" onclick="addQuick('035420','NAVER')">NAVER</button>
      <button class="quick-btn" onclick="addQuick('051910','LG화학')">LG화학</button>
      <button class="quick-btn" onclick="addQuick('068270','셀트리온')">셀트리온</button>
    </div>
    <div class="stock-tags" id="stockTags"></div>
  </div>

  <div class="card">
    <div class="card-title">실시간 현재가</div>
    <div class="price-board" id="priceBoard"></div>
    <div id="pricePlaceholder" style="color:var(--muted);font-size:13px;text-align:center;padding:10px 0;">종목을 추가하고 시작하면 표시됩니다</div>
    <div id="errorMsg" class="error-msg"></div>
  </div>

  <div class="card">
    <div class="card-title">안내 간격</div>
    <div class="interval-grid">
      <button class="interval-btn" onclick="setInterval_(5, this)">5초</button>
      <button class="interval-btn active" onclick="setInterval_(10, this)">10초</button>
      <button class="interval-btn" onclick="setInterval_(20, this)">20초</button>
      <button class="interval-btn" onclick="setInterval_(30, this)">30초</button>
      <button class="interval-btn" onclick="setInterval_(60, this)">1분</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">음성 안내 항목 (중복선택 가능)</div>
    <div class="items-grid">
      <div class="item-check active" id="chk-name" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">종목명</span>
      </div>
      <div class="item-check active" id="chk-price" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">현재가</span>
      </div>
      <div class="item-check active" id="chk-rate" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">등락률</span>
      </div>
      <div class="item-check" id="chk-change" onclick="toggleCheck(this)">
        <div class="check-box"><span class="check-icon">✓</span></div>
        <span class="item-label">전일대비 등락가</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="voice-row">
      <span class="voice-label">🔊 음성 안내</span>
      <label class="toggle">
        <input type="checkbox" id="voiceToggle" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <button class="btn-main btn-start" id="mainBtn" onclick="toggleService()">▶ 시작</button>
</div>

<script>
  let stocks = [];
  let intervalSec = 10;
  let running = false;
  let timer = null;
  let countdown = null;
  let nextSec = 0;
  let speechQueue = [];
  let isSpeaking = false;
  let voiceReady = false;

  // 여러 프록시 순서대로 시도
  const PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    url => `https://thingproxy.freeboard.io/fetch/${url}`,
  ];

  window.addEventListener('load', () => {
    document.getElementById('voiceInit').classList.add('show');
  });

  function initVoice() {
    const utter = new SpeechSynthesisUtterance('');
    utter.volume = 0;
    speechSynthesis.speak(utter);
    voiceReady = true;
    document.getElementById('voiceInit').classList.remove('show');
  }

  function toggleCheck(el) { el.classList.toggle('active'); }

  function getChecked() {
    return {
      name: document.getElementById('chk-name').classList.contains('active'),
      price: document.getElementById('chk-price').classList.contains('active'),
      rate: document.getElementById('chk-rate').classList.contains('active'),
      change: document.getElementById('chk-change').classList.contains('active'),
    };
  }

  const stockMap = {
    '삼성전자': '005930', 'sk하이닉스': '000660',
    'naver': '035420', '네이버': '035420', 'lg화학': '051910',
    '셀트리온': '068270', '카카오': '035720', '현대차': '005380',
    '포스코': '005490', 'lg전자': '066570', '기아': '000270',
    '삼성바이오로직스': '207940', '삼성sdi': '006400'
  };

  function addQuick(code, name) {
    if (stocks.find(s => s.code === code)) return;
    stocks.push({ code, name });
    renderTags();
  }

  function addStock() {
    const input = document.getElementById('stockInput');
    const val = input.value.trim();
    if (!val) return;
    if (/^\d{6}$/.test(val)) {
      if (!stocks.find(s => s.code === val)) { stocks.push({ code: val, name: val }); renderTags(); }
      input.value = ''; return;
    }
    const lower = val.toLowerCase();
    const code = stockMap[lower] || stockMap[val];
    if (code) {
      if (!stocks.find(s => s.code === code)) { stocks.push({ code, name: val }); renderTags(); }
    } else {
      alert('종목을 찾을 수 없습니다.\n6자리 종목코드를 입력해 주세요. (예: 005930)');
    }
    input.value = '';
  }

  document.getElementById('stockInput').addEventListener('keydown', e => { if (e.key === 'Enter') addStock(); });

  function removeStock(code) {
    stocks = stocks.filter(s => s.code !== code);
    renderTags(); renderPriceBoard();
  }

  function renderTags() {
    document.getElementById('stockTags').innerHTML = stocks.map(s => `
      <div class="stock-tag">
        <span>${s.name}</span>
        <span class="remove" onclick="removeStock('${s.code}')">×</span>
      </div>
    `).join('');
  }

  function setInterval_(sec, btn) {
    intervalSec = sec;
    document.querySelectorAll('.interval-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  async function fetchWithProxy(naverUrl) {
    for (const makeUrl of PROXIES) {
      try {
        const proxyUrl = makeUrl(naverUrl);
        const res = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
        if (!res.ok) continue;
        const text = await res.text();
        // allorigins 형식이면 JSON 파싱
        try {
          const json = JSON.parse(text);
          if (json.contents) return json.contents;
        } catch(e) {}
        return text;
      } catch(e) { continue; }
    }
    return null;
  }

  async function fetchPrice(stock) {
    try {
      const url = `https://finance.naver.com/item/main.naver?code=${stock.code}`;
      const html = await fetchWithProxy(url);
      if (!html) return null;
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const priceEl = doc.querySelector('.no_today .blind');
      const blindEls = doc.querySelectorAll('.no_exday .blind');
      const signEl = doc.querySelector('.no_exday .ico');
      if (!priceEl) return null;
      const price = priceEl.textContent.trim();
      const changeVal = blindEls[0] ? blindEls[0].textContent.trim() : '0';
      const rateVal = blindEls[1] ? blindEls[1].textContent.trim() : '0';
      const isUp = signEl && signEl.className.includes('up');
      const isDown = signEl && signEl.className.includes('dn');
      const sign = isUp ? 'up' : isDown ? 'down' : 'flat';
      return { price, changeVal, rateVal, sign };
    } catch(e) { return null; }
  }

  function renderPriceBoard() {
    const board = document.getElementById('priceBoard');
    const placeholder = document.getElementById('pricePlaceholder');
    if (stocks.length === 0) {
      board.classList.remove('visible');
      placeholder.style.display = 'block';
      return;
    }
    placeholder.style.display = 'none';
    board.classList.add('visible');
    board.innerHTML = stocks.map(s => `
      <div class="price-row" id="pr-${s.code}">
        <div class="price-name">${s.name}</div>
        <div class="price-values">
          <div class="price-current" id="pc-${s.code}">불러오는 중...</div>
          <div class="price-change flat" id="pch-${s.code}">--</div>
        </div>
      </div>
    `).join('');
  }

  async function updatePrices() {
    const errEl = document.getElementById('errorMsg');
    let anyError = false;
    for (const stock of stocks) {
      const data = await fetchPrice(stock);
      if (!data) { anyError = true; continue; }
      const priceEl = document.getElementById(`pc-${stock.code}`);
      const changeEl = document.getElementById(`pch-${stock.code}`);
      if (!priceEl) continue;
      errEl.textContent = '';
      const arrow = data.sign === 'up' ? '▲' : data.sign === 'down' ? '▼' : '─';
      priceEl.textContent = Number(data.price.replace(/,/g, '')).toLocaleString() + '원';
      changeEl.textContent = `${arrow} ${data.changeVal}원 (${data.rateVal}%)`;
      changeEl.className = `price-change ${data.sign}`;

      if (document.getElementById('voiceToggle').checked && voiceReady) {
        const checked = getChecked();
        let parts = [];
        if (checked.name) parts.push(stock.name);
        if (checked.price) parts.push(`현재가 ${data.price}원`);
        if (checked.rate) {
          const sw = data.sign === 'up' ? '플러스' : data.sign === 'down' ? '마이너스' : '';
          parts.push(`${sw} ${data.rateVal}퍼센트`);
        }
        if (checked.change) {
          const sw = data.sign === 'up' ? '플러스' : data.sign === 'down' ? '마이너스' : '';
          parts.push(`전일대비 ${sw} ${data.changeVal}원`);
        }
        if (parts.length > 0) queueSpeak(parts.join(', '));
      }
    }
    if (anyError) errEl.textContent = '⚠ 일부 종목 데이터를 불러오지 못했습니다. 잠시 후 재시도합니다.';
  }

  function queueSpeak(text) {
    speechQueue.push(text);
    if (!isSpeaking) processQueue();
  }

  function processQueue() {
    if (speechQueue.length === 0) { isSpeaking = false; return; }
    isSpeaking = true;
    const text = speechQueue.shift();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ko-KR';
    utter.rate = 1.0;
    utter.onend = () => processQueue();
    speechSynthesis.speak(utter);
  }

  function startCountdown() {
    nextSec = intervalSec;
    if (countdown) clearInterval(countdown);
    countdown = setInterval(() => {
      nextSec--;
      document.getElementById('nextTime').textContent = `다음 안내 ${nextSec}초 후`;
      if (nextSec <= 0) nextSec = intervalSec;
    }, 1000);
  }

  async function toggleService() {
    if (!running) {
      if (stocks.length === 0) { alert('종목을 먼저 추가해 주세요!'); return; }
      running = true;
      document.getElementById('mainBtn').textContent = '■ 정지';
      document.getElementById('mainBtn').className = 'btn-main btn-stop';
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusText').textContent = '안내 중';
      renderPriceBoard();
      await updatePrices();
      startCountdown();
      timer = setInterval(async () => { await updatePrices(); startCountdown(); }, intervalSec * 1000);
    } else {
      running = false;
      clearInterval(timer); clearInterval(countdown);
      speechSynthesis.cancel();
      speechQueue = []; isSpeaking = false;
      document.getElementById('mainBtn').textContent = '▶ 시작';
      document.getElementById('mainBtn').className = 'btn-main btn-start';
      document.getElementById('statusDot').classList.remove('active');
      document.getElementById('statusText').textContent = '대기 중';
      document.getElementById('nextTime').textContent = '';
    }
  }
</script>
</body>
</html>
